esphome:
  name: wood-stove
  friendly_name: Wood Stove

esp8266:
  board: nodemcu

# Enable logging
logger:
  level: DEBUG
  #level: WARN          # Reduce noise

# Enable Home Assistant API
api:
  encryption:
    key: "UY3kiB+h4wKR06XXQ6NF4sjx8EhDI0n0yTxhd+T6EkI="

ota:
  - platform: esphome
    password: "1daafc2b64776a1e6e6366b4de48a52e"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Wood-Stove Fallback"

captive_portal:
    

globals:
  - id: high_speed_mode
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: fire_hysteresis_high
    type: float
    restore_value: true
    initial_value: '55.0'     # Turn "Fire" ON above this
  - id: fire_hysteresis_low
    type: float
    restore_value: true
    initial_value: '50.0'     # Turn "Fire" OFF below this

interval:
  - interval: 20s
    then:
      - if:
          condition:
            lambda: return !id(high_speed_mode);
          then:
            - if:
                condition:
                  binary_sensor.is_on: fire
                then:
                  # Fire is burning → 6 seconds
                  - lambda: |-
                      id(chamber_temp).set_update_interval(6000);  // 6s when hot
                      id(chamber_temp).start_poller();
                else:
                  # No fire → 60 seconds
                  - lambda: |-
                      id(chamber_temp).set_update_interval(60000);  // 60s when cold
                      id(chamber_temp).start_poller();

spi:
  id: spi_a
  clk_pin: D5
  miso_pin: D6

sensor:
  - platform: max6675
    id: chamber_temp
    name: "Fire Chamber"
    icon: mdi:fire
    spi_id: spi_a
    cs_pin: D8
    update_interval: 60s
    filters:
      - sliding_window_moving_average:
          window_size: 6
          send_every: 3
      - throttle: 10s
      - heartbeat: 60s

binary_sensor:
  - platform: template
    id: fire
    name: "Fire"
    device_class: heat
    lambda: |-
      static bool fire_state = false;
      
      float t = id(chamber_temp).state;
      if (isnan(t)) return fire_state;   // Keep last state on bad reading
      
      if (fire_state) {
        // Currently ON → only turn OFF if below low threshold
        if (t < id(fire_hysteresis_low)) {
          fire_state = false;
        }
      } else {
        // Currently OFF → only turn ON if above high threshold
        if (t > id(fire_hysteresis_high)) {
          fire_state = true;
        }
      }
      return fire_state;
          
text_sensor:
  - platform: uptime
    name: "Uptime"
    update_interval: 60s
    format:
      separator: ", "      # Space between units (or ", " etc.)
      days: "d"
      hours: "h"
      minutes: "m"
      seconds: "s"      # omit if you don't want seconds when large
    icon: "mdi:clock-start"
    entity_category: diagnostic

  - platform: version
    name: "Version"
    hide_timestamp: true

  - platform: wifi_info
    ip_address:
      name: "IP Address"
      icon: mdi:ip-network

  - platform: template
    name: "Stove Status"
    id: stove_status
    icon: mdi:stove
    lambda: |-
      float t = id(chamber_temp).state;
      if (isnan(t)) return {"Unknown"};

      if (t < 40)          return {"Ambient"};
      else if (t < 80)     return {"Warm"};
      else if (t < 150)    return {"Burning"};
      else if (t < 250)    return {"Hot"};
      else                 return {"Extremely Hot"};

switch:
  - platform: template
    id: high_speed_switch
    name: "High Speed"
    device_class: switch
    icon: mdi:clock-fast
    lambda: return id(high_speed_mode);
    turn_on_action:
      - lambda: |-
          id(high_speed_mode) = true;
          id(chamber_temp).set_update_interval(1000);   // 1 second
          id(chamber_temp).start_poller();
    turn_off_action:
      - lambda: |-
          id(high_speed_mode) = false;
          id(chamber_temp).set_update_interval(6000);  // 6 seconds
          id(chamber_temp).start_poller();

number:
  - platform: template
    name: "Fire ON Threshold"
    id: fire_on_threshold
    icon: mdi:thermometer-chevron-up
    unit_of_measurement: "°C"
    mode: box
    min_value: 30
    max_value: 150
    step: 0.5
    initial_value: 55.0
    set_action:
      - lambda: |-
          // Enforce minimum 3°C gap
          if (x <= id(fire_hysteresis_low) + 3.0) {
            id(fire_hysteresis_high) = id(fire_hysteresis_low) + 3.0;
          } else {
            id(fire_hysteresis_high) = x;
          }

  - platform: template
    name: "Fire OFF Threshold"
    id: fire_off_threshold
    icon: mdi:thermometer-chevron-down
    unit_of_measurement: "°C"
    mode: box
    min_value: 25
    max_value: 140
    step: 0.5
    initial_value: 50.0
    set_action:
      - lambda: |-
          // Enforce minimum 3°C gap
          if (x >= id(fire_hysteresis_high) - 3.0) {
            id(fire_hysteresis_low) = id(fire_hysteresis_high) - 3.0;
          } else {
            id(fire_hysteresis_low) = x;
          }

button:
  - platform: restart
    name: "Restart"
